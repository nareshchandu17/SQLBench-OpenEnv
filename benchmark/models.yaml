# benchmark/models.yaml - SINGLE FREE MODEL
# SQLBench-OpenEnv benchmark configuration
# Uses Ling-2.6-1T (free) model that works without credits

benchmark_name: "SQLBench-OpenEnv"
version: "1.0.0"
description: >
  Evaluation of LLM capability on SQL correction and optimization tasks.
  Covers syntax repair, join logic, aggregation correctness, and query efficiency.

# Global provider configuration (gateway pattern)
provider: "openrouter"
api_key_env: "OPENROUTER_API_KEY"
base_url: "https://openrouter.ai/api/v1"

models:
  - id: "ling-2-6-1t-free"
    name: "Ling-2.6-1T (Free)"
    model_string: "inclusionai/ling-2.6-1t:free"
    max_tokens: 512
    temperature: 0.1

# Tasks to include in the benchmark run.
# Maps to task IDs in env/tasks.py.
benchmark_tasks:
  easy:
    - fix_syntax_simple
    - fix_table_name
  medium:
    - fix_join_logic
    - fix_aggregate_logic
  hard:
    - multi_constraint_query
    - ecommerce_supply_chain

# Evaluation settings
settings:
  max_steps_per_episode: 5     # Keep fast — 1 model × 5 tasks × 5 steps = 25 API calls max
  runs_per_task: 1             # For reproducibility; increase to 3 for variance analysis
  seed: 42
  timeout_seconds: 300         # Per-task wall-clock timeout
